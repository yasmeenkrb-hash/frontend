<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-image: url( " https://ecampus.cc/HICET/ExamApplication/img/hit.jpg");
            background-size: cover;
            background-position: center;
            font-family: Arial, sans-serif;
        }

        .overlay {
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px black;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 12px 0;
            border: none;
            border-bottom: 2px solid #555;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-bottom-color: #2196F3;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2196F3;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
        }

        button:hover {
            background: #0b7dda;
        }

        .links {
            text-align: center;
            margin-top: 15px;
        }

        .links a {
            text-decoration: none;
            color: #2196F3;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="overlay">
    <div class="login-box">
        <h2>Login</h2>

        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>

            <button type="submit">Login</button>

            <div class="links">
                <p><a href="#">Forgot Password?</a></p>
                <p><a href="#">Create Account</a></p>
            </div>
        </form>
    </div>
</div>

</body>
</html>
