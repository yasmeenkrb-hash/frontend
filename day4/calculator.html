<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>
<style>
  body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
  }
  .calc{
    width:220px;
    background:#fff;
    padding:15px;
    border-radius:8px;
    box-shadow:0 0 10px #aaa;
  }
  input{
    width:100%;
    height:40px;
    margin-bottom:10px;
    font-size:18px;
    text-align:right;
  }
  button{
    width:48px;
    height:40px;
    margin:2px;
    font-size:16px;
  }
</style>
</head>
<body>

<div class="calc">
  <input type="text" id="res" disabled>
  <div>
    <button onclick="res.value+='1'">1</button>
    <button onclick="res.value+='2'">2</button>
    <button onclick="res.value+='3'">3</button>
    <button onclick="res.value+='+'">+</button>
  </div>
  <div>
    <button onclick="res.value+='4'">4</button>
    <button onclick="res.value+='5'">5</button>
    <button onclick="res.value+='6'">6</button>
    <button onclick="res.value+='-'">-</button>
  </div>
  <div>
    <button onclick="res.value+='7'">7</button>
    <button onclick="res.value+='8'">8</button>
    <button onclick="res.value+='9'">9</button>
    <button onclick="res.value+='*'">*</button>
  </div>
  <div>
    <button onclick="res.value=''">C</button>
    <button onclick="res.value+='0'">0</button>
    <button onclick="res.value=eval(res.value)">=</button>
    <button onclick="res.value+='/'">/</button>
  </div>
</div>

</body>
</html>
